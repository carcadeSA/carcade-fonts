<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم استلام طلبك — كركديه</title>
<style>
  @font-face {
    font-family: 'CamelYear';
    src: url('TheYearofTheCamel-Regular.otf') format('opentype');
    font-display: swap;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'CamelYear', sans-serif;
    background: #FDF6EE;
    color: #2D2A26;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    direction: rtl;
  }
  .card {
    background: #fff;
    border: 1px solid #E8DDD0;
    border-radius: 20px;
    padding: 50px 40px;
    max-width: 500px;
    width: 100%;
  }
  .icon { font-size: 60px; margin-bottom: 20px; }
  h1 { font-size: 26px; font-weight: 800; color: #8B1A4A; margin-bottom: 12px; }
  p { font-size: 16px; color: #4A4640; line-height: 1.8; margin-bottom: 24px; }
  a {
    display: inline-block;
    background: #8B1A4A;
    color: #fff;
    padding: 12px 36px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    font-family: 'CamelYear', sans-serif;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>تم استلام طلبك بنجاح</h1>
    <p>شكرًا لاهتمامك بالانضمام لفريق كركديه.<br>سنراجع بياناتك وسيرتك الذاتية ونتواصل معك في أقرب وقت.</p>
    <a href="https://carcadesa.github.io/carcade-fonts/">العودة للصفحة الرئيسية</a>
  </div>
</body>
</html>
